apiVersion: v1
kind: Service
metadata:
  name: {{ include "sbombastic.fullname" . }}-nats-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "sbombastic.labels" .| nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  clusterIP: None
  ports:
    - port: 6222
      protocol: TCP
      targetPort: 6222
  selector:
    {{ include "sbombastic.selectorLabels" .| nindent 4 }}
    app.kubernetes.io/component: controller
