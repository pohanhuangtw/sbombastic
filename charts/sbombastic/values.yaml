# Default values for sbombastic.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

controller:
  image:
    repository: ghcr.io/rancher-sandbox/sbombastic/controller
    tag: v0.1.0-alpha1
    pullPolicy: IfNotPresent
  replicas: 3
  logLevel: "info"

storage:
  image:
    repository: ghcr.io/rancher-sandbox/sbombastic/storage
    tag: v0.1.0-alpha1
    pullPolicy: IfNotPresent
  replicas: 1
  # logLevel: "debug" //TODO: uncomment this, when the log parser in storage is implemented

worker:
  image:
    repository: ghcr.io/rancher-sandbox/sbombastic/worker
    tag: v0.1.0-alpha1
    pullPolicy: IfNotPresent
  replicas: 3
  logLevel: "info"

persistence:
  enabled: true

  ## Specify a PVC for the storage data
  storageData:
    enabled: true
    subPath:
    annotations: {}
    labels: {}
    # storageClass: ""
    ## If defined, PVC must be created manually before volume will be bound
    # existingClaim:
    accessMode: ReadWriteOnce
    size: 1Gi



# NOTE: This section is used to configure the NATS server and its components
# deployed by the NATS chart dependency.
# Do not edit this section manually.
nats:
  tlsCA:
    enabled: true
    secretName: sbombastic-nats-server-tls
  config:
    nats:
      tls:
        enabled: true
        secretName: sbombastic-nats-server-tls
        merge:
          verify: true
    cluster:
      enabled: true
      tls:
        enabled: true
        secretName: sbombastic-nats-routes-tls
    jetstream:
      enabled: true
  natsBox:
    enabled: false
  container:
    merge:
      securityContext:
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
            type: RuntimeDefault
        allowPrivilegeEscalation: false
        capabilities:
            drop:
            - "ALL"
  reloader:
    merge:
      securityContext:
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
            type: RuntimeDefault
        allowPrivilegeEscalation: false
        capabilities:
            drop:
            - "ALL"

# NOTE: This section is used to configure the cluster chart dependency.
cluster:
  fullnameOverride: sbombastic-cnpg-cluster
  cluster:
    instances: 1
    initdb:
      database: sbombastic
      owner: sbombastic
      secret:
        name: "" # cnpg will create a secret with the name of the database owner
    postgresql:
      pg_hba:
        - hostssl all all 0.0.0.0/0 scram-sha-256 clientcert=verify-full # mTLS for all connections
        - hostnossl all all 0.0.0.0/0 reject

    certificates:
      serverCASecret:   sbombastic-cnpg-server-cert
      serverTLSSecret:  sbombastic-cnpg-server-cert
      clientCASecret:   sbombastic-cnpg-client-cert
      replicationTLSSecret: sbombastic-cnpg-client-cert

    storage:
      size: 1Gi
      # storageClass:  #  If defined, PVC must be created manually before volume will be bound