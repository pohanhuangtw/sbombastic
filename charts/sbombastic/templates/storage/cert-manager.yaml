apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sbombastic-cnpg-storage-client-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: sbombastic-cnpg-storage-client-tls
  commonName: sbombastic       #  Match DB user
  usages:
    - client auth
  duration: 2160h
  renewBefore: 240h
  issuerRef:
    name: sbombastic-cnpg-client-issuer
    kind: Issuer
    group: cert-manager.io
