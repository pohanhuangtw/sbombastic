name: Release Charts

on:
  push:
    branches:
      - main

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Add dependency chart repos
        run: |
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: .
          packages_with_index: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Prepare GH pages readme
        run: |
          mkdir -p ./to-gh-pages
          cat helm/app-readme.md >> helm/README-to-gh-pages.md
          echo >> helm/README-to-gh-pages.md
          cp -f helm/README-to-gh-pages.md ./to-gh-pages/

      - name: Clone existing gh-pages branch and commit
        run: |
          git fetch origin gh-pages
          git worktree add gh-pages-worktree gh-pages
          cp -r ./to-gh-pages/* gh-pages-worktree/
          cd gh-pages-worktree
          git add .
          git commit -m "Update GitHub Pages content" || echo "No changes to commit"
          git push origin gh-pages